<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATS Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Modular CSS -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/charts.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
  <!-- Top Navigation -->
  <div id="topnav">
    <span class="logo"><span class="emoji">🧠</span> ATS Dashboard <span class="version">v6</span></span>
    <span class="project" id="project-name"></span>
  </div>

  <!-- App Layout -->
  <div id="app">
    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <label>Flows</label>
        <input type="text" id="search" placeholder="Search flows..." />
      </div>
      <div id="flow-list"></div>
      <div id="sidebar-footer"></div>
    </div>

    <!-- Main Content -->
    <div id="main">
      <div class="empty-state" id="empty-state">
        <div class="icon">🧠</div>
        <div class="title">Select a flow</div>
        <div>Click on a flow in the sidebar, or view the overview</div>
      </div>
      <div id="detail-view" style="display:none">
        <div class="tabs">
          <div class="tab" data-tab="overview">OVERVIEW</div>
          <div class="tab active" data-tab="detail">DETAIL</div>
          <div class="tab" data-tab="graph">GRAPH</div>
        </div>
        <div id="tab-overview" style="display:none"></div>
        <div id="tab-detail"></div>
        <div id="tab-graph" style="display:none">
          <div id="graph-container"><svg id="graph-svg"></svg></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Overlay Elements -->
  <div id="tooltip"></div>
  <div id="toast-container"></div>

  <!-- Modular JS (order matters: config → state → api → components → app) -->
  <script src="/js/config.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/detail.js"></script>
  <script src="/js/overview.js"></script>
  <script src="/js/graph.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
